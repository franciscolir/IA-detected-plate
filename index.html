<!DOCTYPE html>
<html lang="es-CL" data-bs-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <meta name="theme-color" content="#0b0f14" />
  <title>IA Detected Plate</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="assets/css/app.css" />
  <style>
    :root { --bg: #0b0f14; --surface: #131a23; --accent: #00d26a; --text: #e6edf3; }
    body { background: var(--bg); color: var(--text); font-family: system-ui, -apple-system, sans-serif; }
    .app-shell { max-width: 900px; margin: 0 auto; }
    .video-box { position: relative; width: 100%; aspect-ratio: 16/9; background: #000; overflow: hidden; border-radius: 8px; }
    #video { width: 100%; height: 100%; object-fit: cover; }
    #overlay { position: absolute; inset: 0; width: 100%; height: 100%; pointer-events: none; }

    /* Chilean license plate CSS */
    #plate-display {
      width: 320px; height: 140px; margin: 1rem auto;
      position: relative; perspective: 600px; cursor: default;
    }
    #plate-display .plate-inner {
      width: 100%; height: 100%;
      background: linear-gradient(180deg, #0038a8 8px, #fff 8px calc(100% - 8px), #d52b1e calc(100% - 8px));
      border: 2px solid #222; border-radius: 6px;
      display: flex; align-items: center; justify-content: center; gap: 0.5rem;
      font-family: 'Courier New', monospace; font-weight: 900; font-size: 3.2rem;
      color: #1a1a1a; letter-spacing: 0.1em;
      box-shadow: 0 4px 16px rgba(0,0,0,0.5), inset 0 1px 2px rgba(255,255,255,0.2);
      transform: rotateX(2deg) rotateY(-2deg);
    }
    #plate-display .plate-badge {
      position: absolute; top: -8px; left: 50%; transform: translateX(-50%);
      background: #0038a8; color: #fff; font-size: 0.55rem; font-weight: 700;
      padding: 0 10px; border-radius: 3px; letter-spacing: 1px;
      text-transform: uppercase;
    }
    #plate-display .plate-separator {
      width: 4px; height: 60%; background: #0038a8; border-radius: 2px; opacity: 0.3;
    }
    #plate-display .plate-letters, #plate-display .plate-numbers {
      text-shadow: 1px 1px 1px rgba(0,0,0,0.15);
    }
    #plate-display .plate-numbers { color: #0038a8; }
    #plate-display.detected .plate-inner { box-shadow: 0 0 24px var(--accent), 0 4px 16px rgba(0,0,0,0.5); }
    #plate-display:not(.detected) .plate-letters, #plate-display:not(.detected) .plate-numbers { opacity: 0.2; }

    .hud { background: rgba(0,0,0,0.5); padding: 0.3rem 0.6rem; font-size: 0.8rem; border-radius: 4px; }
    .hud .badge { font-size: 0.65rem; }
    .settings-section label { font-size: 0.75rem; }
    .test-links a { font-size: 0.8rem; }
    #status { min-height: 1.2em; font-size: 0.8rem; }
  </style>
</head>
<body>
  <main class="app-shell p-2">
    <!-- Header -->
    <div class="d-flex justify-content-between align-items-center mb-2">
      <span class="small text-secondary">IA Detected Plate</span>
      <span id="fps" class="hud small text-secondary">FPS --</span>
    </div>

    <!-- Camera -->
    <div class="video-box">
      <video id="video" autoplay playsinline muted></video>
      <canvas id="overlay" class="overlay"></canvas>
    </div>

    <!-- CSS Chilean plate -->
    <div id="plate-display">
      <div class="plate-badge">CHILE</div>
      <div class="plate-inner">
        <span class="plate-letters">ABCD</span>
        <span class="plate-separator"></span>
        <span class="plate-numbers">12</span>
      </div>
    </div>

    <!-- Controls -->
    <div class="d-flex gap-2 mb-2 justify-content-center">
      <button id="btn-start" class="btn btn-success px-4">Iniciar</button>
      <button id="btn-stop" class="btn btn-outline-secondary px-4" disabled>Detener</button>
    </div>
    <div id="status" class="text-center text-secondary small mb-2">Listo.</div>

    <!-- Settings -->
    <details class="mb-2 small settings-section">
      <summary class="text-secondary" style="cursor:pointer">Ajustes</summary>
      <div class="p-2 bg-dark rounded mt-1">
        <div class="mb-2">
          <label>Sensibilidad <span id="cfg-sensitivity-val">0.15</span></label>
          <input type="range" id="cfg-sensitivity" class="form-range" min="0.05" max="0.50" step="0.05" value="0.15" />
        </div>
        <div class="mb-2">
          <label>Streak <span id="cfg-streak-val">3</span></label>
          <input type="range" id="cfg-streak" class="form-range" min="1" max="10" step="1" value="3" />
        </div>
        <div class="mb-2">
          <label>No-detect frames <span id="cfg-nodetect-val">30</span></label>
          <input type="range" id="cfg-nodetect" class="form-range" min="5" max="60" step="1" value="30" />
        </div>
      </div>
    </details>

    <!-- Test links -->
    <div class="text-center test-links mt-3">
      <a href="test_camera.html" class="text-info small me-3">Test C&aacute;mara</a>
      <a href="test_ocr.html" class="text-info small me-3">Test OCR</a>
      <a href="test_detector.html" class="text-info small">Test Detector</a>
    </div>
  </main>

  <script type="importmap">{"imports":{"onnxruntime-web":"https://cdn.jsdelivr.net/npm/onnxruntime-web@1.27.0/dist/ort.min.mjs"}}</script>
  <script type="module" src="assets/js/app.js"></script>
</body>
</html>
