<!DOCTYPE html>
<html lang="es-CL" data-bs-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Test Detector - IA Detected Plate</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="assets/css/test_detector.css" />
</head>
<body>
<div class="container-fluid p-2">
  <div class="d-flex justify-content-between align-items-center mb-2">
    <span class="small text-secondary"><a href="index.html" class="text-info">&larr; Inicio</a> &nbsp; Test Detector</span>
  </div>

  <div class="d-flex align-items-center gap-2 mb-2 flex-wrap">
    <label class="btn btn-primary btn-sm mb-0">
      Subir imagen <input type="file" id="file-input" accept="image/*" style="display:none" />
    </label>
  </div>
  <div class="small text-warning mb-2">
    ⚠ Sube una foto de auto donde se vea la placa. El detector busca la patente y la marca.
  </div>

  <div class="row g-2">
    <div class="col-12 col-lg-7">
      <div id="img-container">
        <img id="uploaded-img" class="w-100" style="display:none" />
        <canvas id="overlay"></canvas>
      </div>
      <button id="btn-detect" class="btn btn-success btn-sm w-100 mt-1 mb-1">Detectar placa</button>

      <div class="stats-grid mt-1" id="stats-grid">
        <div class="stat">YOLO boxes <span class="val" id="stat-preds">--</span></div>
        <div class="stat">High conf <span class="val" id="stat-high">--</span></div>
        <div class="stat">Max conf <span class="val" id="stat-maxconf">--</span></div>
        <div class="stat">Fallback <span class="val" id="stat-fb">--</span></div>
      </div>
    </div>

    <div class="col-12 col-lg-5">
      <ul class="nav nav-tabs nav-fill small mb-2">
        <li class="nav-item"><button class="nav-link active" data-bs-toggle="tab" data-bs-target="#tab-params">Par&aacute;metros</button></li>
        <li class="nav-item"><button class="nav-link" data-bs-toggle="tab" data-bs-target="#tab-log">Log</button></li>
      </ul>
      <div class="tab-content">
        <div class="tab-pane active" id="tab-params">
          <div class="controls small">
            <div class="mb-1"><label>Confianza min <span id="val-conf">0.15</span></label><input type="range" class="form-range" id="param-conf" min="0.01" max="0.50" step="0.01" value="0.15" /></div>
            <div class="mb-1"><label>IoU NMS <span id="val-iou">0.45</span></label><input type="range" class="form-range" id="param-iou" min="0.10" max="0.90" step="0.05" value="0.45" /></div>
            <div class="mb-1"><label>Input size <span id="val-imgsz">640</span></label><input type="range" class="form-range" id="param-imgsz" min="320" max="640" step="32" value="640" /></div>
            <div class="mb-1"><label>Fallback edge <span id="val-edge">0.12</span></label><input type="range" class="form-range" id="param-edge" min="0.03" max="0.30" step="0.01" value="0.12" /></div>
            <div class="mb-1"><label>Fallback minH <span id="val-minh">4</span></label><input type="range" class="form-range" id="param-minh" min="2" max="20" step="1" value="4" /></div>
          </div>
        </div>
        <div class="tab-pane" id="tab-log"><div class="log-box" id="log-box">[Listo] Sube; una imagen y presion&aacute; Detectar</div></div>
      </div>
    </div>
  </div>
</div>

<script type="importmap">{"imports":{"onnxruntime-web":"https://cdn.jsdelivr.net/npm/onnxruntime-web@1.27.0/dist/ort.min.mjs"}}</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script type="module" src="assets/js/test_detector.js"></script>
</body>
</html>
