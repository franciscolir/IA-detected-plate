<!DOCTYPE html>
<html lang="es-CL" data-bs-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Test Detector - IA Detected Plate</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
  <style>
    body { background: #0b0f14; color: #e6edf3; font-family: system-ui, sans-serif; }
    .video-box { position: relative; background: #000; width: 100%; aspect-ratio: 16/9; }
    #video { width: 100%; height: 100%; object-fit: cover; }
    #overlay { position: absolute; inset: 0; pointer-events: none; }
    .log-box { background: #0a0a0a; border: 1px solid #333; border-radius: 4px; font-family: monospace; font-size: 0.7rem; height: 250px; overflow-y: auto; padding: 0.4rem; }
    .config-preview { font-family: monospace; font-size: 0.7rem; background: #0a0a0a; border: 1px solid #333; border-radius: 4px; padding: 0.4rem; max-height: 150px; overflow-y: auto; }
    .controls label { font-size: 0.75rem; }
    .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 4px; font-size: 0.75rem; }
    .stats-grid .stat { background: #131a23; border: 1px solid #333; border-radius: 4px; padding: 4px 8px; }
    .stats-grid .stat .val { font-weight: 700; font-family: monospace; }
  </style>
</head>
<body>
<div class="container-fluid p-2">
  <div class="d-flex justify-content-between align-items-center mb-2">
    <span class="small text-secondary"><a href="index.html" class="text-info">&larr; Inicio</a> &nbsp; Test Detector</span>
    <span id="fps" class="small text-secondary">FPS --</span>
  </div>
  <div class="row g-2">
    <div class="col-12 col-lg-7">
      <div class="video-box">
        <video id="video" autoplay playsinline muted></video>
        <canvas id="overlay" class="overlay"></canvas>
      </div>
      <div class="d-flex gap-2 mt-1">
        <button id="btn-start" class="btn btn-success btn-sm flex-fill">Iniciar</button>
        <button id="btn-stop" class="btn btn-outline-secondary btn-sm flex-fill" disabled>Detener</button>
      </div>
      <!-- Stats -->
      <div class="stats-grid mt-1" id="stats-grid">
        <div class="stat">YOLO boxes <span class="val" id="stat-preds">0</span></div>
        <div class="stat">YOLO high <span class="val" id="stat-high">0</span></div>
        <div class="stat">Max conf <span class="val" id="stat-maxconf">0%</span></div>
        <div class="stat">Fallback <span class="val" id="stat-fb">--</span></div>
      </div>
    </div>
    <div class="col-12 col-lg-5">
      <ul class="nav nav-tabs nav-fill small mb-2">
        <li class="nav-item"><button class="nav-link active" data-bs-toggle="tab" data-bs-target="#tab-params">Par&aacute;metros</button></li>
        <li class="nav-item"><button class="nav-link" data-bs-toggle="tab" data-bs-target="#tab-log">Log</button></li>
        <li class="nav-item"><button class="nav-link" data-bs-toggle="tab" data-bs-target="#tab-config">Config</button></li>
      </ul>
      <div class="tab-content">
        <div class="tab-pane active" id="tab-params">
          <div class="controls small">
            <div class="mb-1"><label>Confianza min <span id="val-conf">0.15</span></label><input type="range" class="form-range" id="param-conf" min="0.01" max="0.50" step="0.01" value="0.15" /></div>
            <div class="mb-1"><label>IoU NMS <span id="val-iou">0.45</span></label><input type="range" class="form-range" id="param-iou" min="0.10" max="0.90" step="0.05" value="0.45" /></div>
            <div class="mb-1"><label>Input size <span id="val-imgsz">640</span></label><input type="range" class="form-range" id="param-imgsz" min="320" max="640" step="32" value="640" /></div>
            <div class="mb-1"><label>Fallback edge <span id="val-edge">0.12</span></label><input type="range" class="form-range" id="param-edge" min="0.03" max="0.30" step="0.01" value="0.12" /></div>
            <div class="mb-1"><label>Fallback minH <span id="val-minh">4</span></label><input type="range" class="form-range" id="param-minh" min="2" max="20" step="1" value="4" /></div>
          </div>
        </div>
        <div class="tab-pane" id="tab-log"><div class="log-box" id="log-box">[Listo]</div></div>
        <div class="tab-pane" id="tab-config"><div class="config-preview" id="config-preview">--</div></div>
      </div>
    </div>
  </div>
</div>
<script type="importmap">{"imports":{"onnxruntime-web":"https://cdn.jsdelivr.net/npm/onnxruntime-web@1.27.0/dist/ort.min.mjs"}}</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script type="module">
import * as ort from 'onnxruntime-web';

let session, stream, running;
const video = document.getElementById('video');
const overlay = document.getElementById('overlay');
const logBox = document.getElementById('log-box');
let frameCount = 0, lastFpsTime = performance.now();

function log(msg, type = 'info') {
  const d = document.createElement('div'); d.className = type;
  d.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`;
  logBox.appendChild(d); logBox.scrollTop = logBox.scrollHeight;
}

async function load() {
  log('Cargando detector...');
  try {
    session = await ort.InferenceSession.create('assets/models/yolov8_plate.onnx', { executionProviders: ['wasm'] });
    log('Detector cargado', 'ok');
  } catch (e) { log('Error: ' + e.message, 'err'); }
}
await load();

function getParams() {
  return {
    conf: parseFloat(document.getElementById('param-conf').value),
    iou: parseFloat(document.getElementById('param-iou').value),
    imgsz: parseInt(document.getElementById('param-imgsz').value),
    edge: parseFloat(document.getElementById('param-edge').value),
    minH: parseInt(document.getElementById('param-minh').value),
  };
}
document.querySelectorAll('#tab-params input').forEach(el => {
  el.addEventListener('input', () => {
    const id = el.id.replace('param-', '');
    const val = document.getElementById(`val-${id}`);
    if (val) val.textContent = el.value;
  });
});

function preprocess(video, isz) {
  const vw = video.videoWidth, vh = video.videoHeight;
  const maxSize = Math.max(vw, vh);
  const scale = isz / maxSize;
  const ox = (isz - vw * scale) / 2, oy = (isz - vh * scale) / 2;
  const c = document.createElement('canvas');
  c.width = isz; c.height = isz;
  const ctx = c.getContext('2d');
  ctx.fillStyle = '#000'; ctx.fillRect(0, 0, isz, isz);
  ctx.drawImage(video, ox, oy, vw * scale, vh * scale);
  const rgba = ctx.getImageData(0, 0, isz, isz).data;
  const ch = isz * isz;
  const data = new Float32Array(3 * ch);
  for (let i = 0; i < ch; i++) {
    const pi = i << 2;
    data[i] = rgba[pi] / 255;
    data[ch + i] = rgba[pi + 1] / 255;
    data[2 * ch + i] = rgba[pi + 2] / 255;
  }
  return { tensor: new ort.Tensor('float32', data, [1, 3, isz, isz]), transform: { scale, ox, oy, vw, vh } };
}

function decode(data, dims, isz) {
  const numPreds = dims[2];
  const raw = [];
  const maxCx = Math.max(...data.slice(0, Math.min(numPreds, 100)));
  const normalized = maxCx < 2;
  const scale = normalized ? isz : 1;
  for (let i = 0; i < numPreds; i++) {
    const cx = data[i], cy = data[numPreds + i];
    const w = data[2 * numPreds + i], h = data[3 * numPreds + i];
    const conf = data[4 * numPreds + i];
    if (conf < 0.05) continue;
    raw.push({ x1: (cx - w/2) * scale, y1: (cy - h/2) * scale, x2: (cx + w/2) * scale, y2: (cy + h/2) * scale, score: conf });
  }
  return raw;
}

function toOriginal(box, t) {
  return { x1: Math.max(0, (box.x1 - t.ox) / t.scale), y1: Math.max(0, (box.y1 - t.oy) / t.scale), x2: Math.min(t.vw, (box.x2 - t.ox) / t.scale), y2: Math.min(t.vh, (box.y2 - t.oy) / t.scale), score: box.score };
}

function nms(dets, thresh) {
  dets.sort((a, b) => b.score - a.score);
  const picked = new Array(dets.length).fill(false);
  const result = [];
  for (let i = 0; i < dets.length; i++) {
    if (picked[i]) continue; result.push(dets[i]);
    for (let j = i + 1; j < dets.length; j++) {
      if (picked[j]) continue;
      const x1 = Math.max(dets[i].x1, dets[j].x1), y1 = Math.max(dets[i].y1, dets[j].y1);
      const x2 = Math.min(dets[i].x2, dets[j].x2), y2 = Math.min(dets[i].y2, dets[j].y2);
      const inter = Math.max(0, x2 - x1) * Math.max(0, y2 - y1);
      const aA = (dets[i].x2 - dets[i].x1) * (dets[i].y2 - dets[i].y1);
      const aB = (dets[j].x2 - dets[j].x1) * (dets[j].y2 - dets[j].y1);
      if (inter / (aA + aB - inter + 1e-6) >= thresh) picked[j] = true;
    }
  }
  return result;
}

function detectFallback(video, params) {
  const vw = video.videoWidth, vh = video.videoHeight;
  if (vw < 50 || vh < 50) return null;
  const c = document.createElement('canvas');
  c.width = vw; c.height = vh;
  const ctx = c.getContext('2d');
  ctx.drawImage(video, 0, 0);
  const data = ctx.getImageData(0, 0, vw, vh).data;
  const gray = new Uint8Array(vw * vh);
  for (let i = 0; i < vw * vh; i++) gray[i] = (data[i<<2] * 0.299 + data[(i<<2)+1] * 0.587 + data[(i<<2)+2] * 0.114) | 0;
  const grad = new Float32Array(vw * vh);
  let maxGrad = 0;
  for (let y = 0; y < vh; y++) for (let x = 0; x < vw - 1; x++) { const g = Math.abs(gray[y*vw+x] - gray[y*vw+x+1]); grad[y*vw+x] = g; if (g > maxGrad) maxGrad = g; }
  if (maxGrad < 5) return null;
  const edgeThresh = maxGrad * params.edge;
  const rowCount = new Uint16Array(vh);
  for (let y = 0; y < vh; y++) { let c = 0; for (let x = 0; x < vw; x++) { if (grad[y*vw+x] > edgeThresh) c++; } rowCount[y] = c; }
  let maxR = 0; for (let y = 0; y < vh; y++) { if (rowCount[y] > maxR) maxR = rowCount[y]; }
  if (maxR < 3) return null;
  const rowMin = Math.max(3, maxR * 0.15);
  let yS = -1, yE = -1;
  for (let y = 0; y < vh; y++) { if (rowCount[y] > rowMin) { if (yS === -1) yS = y; yE = y; } }
  if (yS === -1 || yE - yS < 3) return null;
  yS = Math.max(0, yS - 3); yE = Math.min(vh, yE + 3);
  const colCount = new Uint16Array(vw);
  for (let x = 0; x < vw; x++) { let c = 0; for (let y = yS; y < yE; y++) { if (grad[y*vw+x] > edgeThresh) c++; } colCount[x] = c; }
  let maxC = 0; for (let x = 0; x < vw; x++) { if (colCount[x] > maxC) maxC = colCount[x]; }
  if (maxC < 3) return null;
  const colMin = Math.max(3, maxC * 0.18);
  let xS = -1, xE = -1;
  for (let x = 0; x < vw; x++) { if (colCount[x] > colMin) { if (xS === -1) xS = x; xE = x; } }
  if (xS === -1 || xE - xS < 10) return null;
  xS = Math.max(0, xS - 4); xE = Math.min(vw, xE + 4);
  const pw = xE - xS, ph = yE - yS;
  if (pw < 10 || ph < params.minH) return null;
  if (pw > vw * 0.95 || ph > vh * 0.95) return null;
  const aspect = pw / ph;
  const aspectScore = Math.max(0, 1 - Math.abs(aspect - 3.5) / 5);
  const densityScore = Math.min(1, (maxR + maxC) / (vw * 0.05 + vh * 0.5));
  const score = 0.2 + 0.4 * aspectScore + 0.4 * densityScore;
  return { x1: xS, y1: yS, x2: xE, y2: yE, score: Math.min(0.7, score) };
}

async function start() {
  stream = await navigator.mediaDevices.getUserMedia({ video: { width: 1280, height: 720, facingMode: 'environment' } });
  video.srcObject = stream; await video.play();
  running = true;
  document.getElementById('btn-start').disabled = true;
  document.getElementById('btn-stop').disabled = false;
  log('Iniciado', 'ok');
  loop();
}
function stop() {
  running = false;
  if (stream) { stream.getTracks().forEach(t => t.stop()); stream = null; }
  video.srcObject = null;
  document.getElementById('btn-start').disabled = false;
  document.getElementById('btn-stop').disabled = true;
  log('Detenido', 'warn');
}
document.getElementById('btn-start').addEventListener('click', start);
document.getElementById('btn-stop').addEventListener('click', stop);

async function loop() {
  if (!running || !video.videoWidth) { requestAnimationFrame(loop); return; }
  const p = getParams();
  if (overlay.width !== video.videoWidth) { overlay.width = video.videoWidth; overlay.height = video.videoHeight; }

  const ctx = overlay.getContext('2d');
  ctx.clearRect(0, 0, overlay.width, overlay.height);

  let yoloBoxes = [], fallbackBox = null;

  if (session) {
    const { tensor, transform } = preprocess(video, p.imgsz);
    const results = await session.run({ [session.inputNames[0]]: tensor });
    const output = results[session.outputNames[0]];
    const raw = decode(output.data, output.dims, p.imgsz);
    const nmsBoxes = nms(raw, p.iou);
    const high = nmsBoxes.filter(b => b.score >= p.conf);
    yoloBoxes = high.map(b => toOriginal(b, transform)).filter(b => (b.x2-b.x1) >= 30 && (b.y2-b.y1) >= 10 && (b.x2-b.x1)/(b.y2-b.y1+1) < 12);

    const maxConf = raw.length ? Math.max(...raw.map(b => b.score)) : 0;
    document.getElementById('stat-preds').textContent = raw.length;
    document.getElementById('stat-high').textContent = high.length;
    document.getElementById('stat-maxconf').textContent = (maxConf*100).toFixed(1) + '%';
  }

  if (yoloBoxes.length === 0) {
    fallbackBox = detectFallback(video, p);
    document.getElementById('stat-fb').textContent = fallbackBox ? (fallbackBox.score*100).toFixed(1) + '%' : '--';
  } else {
    document.getElementById('stat-fb').textContent = '--';
  }

  // Draw YOLO boxes (yellow)
  for (const b of yoloBoxes) {
    ctx.strokeStyle = '#ffcc00'; ctx.lineWidth = 2;
    ctx.strokeRect(b.x1, b.y1, b.x2-b.x1, b.y2-b.y1);
    ctx.fillStyle = '#ffcc00'; ctx.font = '11px monospace';
    ctx.fillText((b.score*100).toFixed(0) + '%', b.x1, b.y1-3);
  }

  // Draw fallback (blue dashed)
  if (fallbackBox) {
    ctx.strokeStyle = '#00aaff'; ctx.lineWidth = 2; ctx.setLineDash([4,4]);
    ctx.strokeRect(fallbackBox.x1, fallbackBox.y1, fallbackBox.x2-fallbackBox.x1, fallbackBox.y2-fallbackBox.y1);
    ctx.setLineDash([]);
    ctx.fillStyle = '#00aaff'; ctx.font = '11px monospace';
    ctx.fillText('F ' + (fallbackBox.score*100).toFixed(0) + '%', fallbackBox.x1, fallbackBox.y2 + 14);
  }

  // Center crosshair
  ctx.strokeStyle = 'rgba(255,255,255,0.15)'; ctx.lineWidth = 1; ctx.setLineDash([4,6]);
  const cx = overlay.width/2, cy = overlay.height/2;
  ctx.beginPath(); ctx.moveTo(cx-30, cy); ctx.lineTo(cx+30, cy);
  ctx.moveTo(cx, cy-30); ctx.lineTo(cx, cy+30); ctx.stroke(); ctx.setLineDash([]);

  document.getElementById('config-preview').textContent = JSON.stringify(p);

  frameCount++;
  const now = performance.now();
  if (now - lastFpsTime >= 1000) {
    document.getElementById('fps').textContent = `FPS ${frameCount}`;
    frameCount = 0; lastFpsTime = now;
  }
  requestAnimationFrame(loop);
}
</script>
</body>
</html>
