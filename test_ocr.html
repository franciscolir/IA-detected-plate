<!DOCTYPE html>
<html lang="es-CL" data-bs-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Test OCR - IA Detected Plate</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="assets/css/test_ocr.css" />
</head>
<body>
<div class="container-fluid p-2">
  <div class="d-flex justify-content-between align-items-center mb-2">
    <span class="small text-secondary"><a href="index.html" class="text-info">&larr; Inicio</a> &nbsp; Test OCR</span>
  </div>

  <!-- Upload -->
  <div class="d-flex align-items-center gap-2 mb-2 flex-wrap">
    <label class="btn btn-primary btn-sm mb-0">
      Subir imagen de placa <input type="file" id="file-input" accept="image/*" multiple style="display:none" />
    </label>
    <button id="btn-clear" class="btn btn-outline-secondary btn-sm">Limpiar todo</button>
    <div class="small text-secondary ms-2" id="upload-count">0 im&aacute;genes</div>
  </div>
  <div class="small text-warning mb-2">
    Sube solo la placa recortada (no el auto completo). El OCR procesa toda la imagen como si fuera una placa.
  </div>

  <div class="row g-2">
    <!-- Left: image list -->
    <div class="col-12 col-lg-5">
      <div class="image-list" id="image-list"></div>
    </div>

    <!-- Right: selected image + OCR result -->
    <div class="col-12 col-lg-7">
      <div id="selected-view" class="text-center text-secondary small py-4">Sube una imagen recortada de placa para analizar</div>
      <button id="btn-detect-ocr" class="btn btn-success btn-sm w-100 mt-1">Detectar caracteres</button>

      <!-- OCR controls -->
      <div class="row g-1 mt-1 controls small">
        <div class="col-6">
          <label>Input height <span id="val-h">48</span></label>
          <input type="range" class="form-range" id="param-h" min="16" max="96" step="8" value="48" />
        </div>
        <div class="col-6">
          <label>Min conf <span id="val-conf">0.01</span></label>
          <input type="range" class="form-range" id="param-conf" min="0.01" max="0.50" step="0.01" value="0.01" />
        </div>
      </div>

      <div id="result-area"></div>
      <div class="log-box mt-1" id="log-box">[Listo] Sube una imagen recortada de placa para analizar</div>
    </div>
  </div>
</div>

<script type="importmap">{"imports":{"onnxruntime-web":"https://cdn.jsdelivr.net/npm/onnxruntime-web@1.27.0/dist/ort.min.mjs"}}</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script type="module" src="assets/js/test_ocr.js"></script>
</body>
</html>
